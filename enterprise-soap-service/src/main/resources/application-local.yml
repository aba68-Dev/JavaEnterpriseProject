# ─────────────────────────────────────────────────────────────────────────────
# PROFILE: local  (soap-service)
# Activate: mvn spring-boot:run -Dspring-boot.run.profiles=local
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/enterprise_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:enterprise_user}
    password: ${DB_PASSWORD:enterprise_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com.enterprise: DEBUG
    org.apache.cxf: INFO
    org.hibernate.SQL: DEBUG
