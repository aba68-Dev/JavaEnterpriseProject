# ─────────────────────────────────────────────────────────────────────────────
# PROFILE: h2  (soap-service)
# Activate: mvn spring-boot:run -Dspring-boot.run.profiles=h2
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:h2:mem:enterprise_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.enterprise: DEBUG
    org.apache.cxf: INFO
    org.hibernate.SQL: DEBUG
