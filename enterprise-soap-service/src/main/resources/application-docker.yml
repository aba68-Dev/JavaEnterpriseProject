# ─────────────────────────────────────────────────────────────────────────────
# PROFILE: docker  (soap-service)
# Set via docker-compose: SPRING_PROFILES_ACTIVE=docker
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/enterprise_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:enterprise_user}
    password: ${DB_PASSWORD:enterprise_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com.enterprise: INFO
    org.apache.cxf: WARN
