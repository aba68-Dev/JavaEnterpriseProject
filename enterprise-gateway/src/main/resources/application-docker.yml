# ─────────────────────────────────────────────────────────────────────────────
# PROFILE: docker  (gateway)
# Set via docker-compose: SPRING_PROFILES_ACTIVE=docker
# Credentials come from environment variables injected by Docker Compose.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  security:
    user:
      name: ${ADMIN_USER:admin}
      password: ${ADMIN_PASSWORD:Admin@1234}

logging:
  level:
    com.enterprise: INFO
    org.springframework.security: INFO
