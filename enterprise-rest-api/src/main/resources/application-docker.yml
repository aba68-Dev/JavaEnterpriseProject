# ─────────────────────────────────────────────────────────────────────────────
# PROFILE: docker
# Use when running inside Docker Compose.
# Container hostnames replace localhost — set via docker-compose.yml:
#   environment:
#     SPRING_PROFILES_ACTIVE: docker
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/enterprise_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:enterprise_user}
    password: ${DB_PASSWORD:enterprise_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: EnterpriseHikariPool-Docker
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: kafka:29092      # internal Docker network listener
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: enterprise-rest-api-group
      auto-offset-reset: earliest
      enable-auto-commit: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://gateway:9000/oauth2/jwks   # Docker service name
          issuer-uri: http://gateway:9000

logging:
  level:
    com.enterprise: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
